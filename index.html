<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מצגת ללמידה עצמית — מתמטיקה ה'-ו'</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Rubik',sans-serif;direction:rtl;background:#0f172a;color:#f8fafc;height:100vh;overflow:hidden}
.math{direction:ltr;display:inline-block;font-family:monospace;background:rgba(0,0,0,0.2);padding:3px 12px;border-radius:6px;font-weight:700;font-size:1.05em}

/* ── TEACHER SCREEN ── */
#teacherScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%)}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:32px;padding:50px 60px;max-width:600px;width:100%;text-align:center}
.card h1{font-size:2.4rem;font-weight:900;margin-bottom:8px}
.card p{color:#94a3b8;font-size:1.1rem;margin-bottom:36px}
#topicInput{width:100%;background:rgba(255,255,255,0.07);border:2px solid rgba(20,184,166,0.4);border-radius:16px;padding:18px 22px;font-family:'Rubik',sans-serif;font-size:1.2rem;font-weight:700;color:#f8fafc;direction:rtl;outline:none;transition:.3s}
#topicInput:focus{border-color:#14b8a6;box-shadow:0 0 0 4px rgba(20,184,166,0.15)}
#topicInput::placeholder{color:#475569}
.quick-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:20px 0}
.qbtn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:20px;padding:8px 18px;color:#cbd5e1;font-family:'Rubik',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:.2s}
.qbtn:hover{background:rgba(20,184,166,0.2);border-color:#14b8a6;color:#5eead4}
#genBtn{width:100%;background:linear-gradient(135deg,#14b8a6,#059669);border:none;border-radius:18px;padding:20px;font-family:'Rubik',sans-serif;font-size:1.25rem;font-weight:900;color:#fff;cursor:pointer;margin-top:22px;transition:.2s;box-shadow:0 8px 30px rgba(20,184,166,0.3)}
#genBtn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(20,184,166,0.4)}

/* ── PRESENTATION ── */
#pres{display:none;position:fixed;inset:0;z-index:100}
#progBar{position:fixed;top:0;right:0;height:5px;background:linear-gradient(90deg,#14b8a6,#059669);transition:width .4s;z-index:200;left:auto}
#backBtn{position:fixed;top:16px;left:16px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:10px 18px;color:rgba(255,255,255,0.8);font-family:'Rubik',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;z-index:200;transition:.2s}
#backBtn:hover{background:rgba(255,255,255,0.2)}
#nav{position:fixed;bottom:24px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:18px;z-index:200}
.nbtn{background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.25);border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;transition:.2s}
.nbtn:hover{background:rgba(255,255,255,0.25);transform:scale(1.1)}
#counter{color:rgba(255,255,255,0.7);font-weight:700;font-size:1rem;min-width:70px;text-align:center}

/* ── SLIDES ── */
.slide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 80px 100px;text-align:center;opacity:0;transform:translateX(-30px);transition:all .4s cubic-bezier(.4,0,.2,1);pointer-events:none;overflow-y:auto}
.slide.active{opacity:1;transform:translateX(0);pointer-events:all}
.slide.exit{opacity:0;transform:translateX(30px)}

/* slide themes */
.s-title{background:linear-gradient(135deg,#0f766e,#059669,#0891b2)}
.s-goals{background:linear-gradient(135deg,#1e1b4b,#312e81)}
.s-concept{background:linear-gradient(135deg,#0c4a6e,#075985)}
.s-example{background:linear-gradient(135deg,#2e1065,#4c1d95)}
.s-quiz{background:linear-gradient(135deg,#451a03,#78350f)}
.s-practice{background:linear-gradient(135deg,#022c22,#14532d)}
.s-summary{background:linear-gradient(135deg,#0f172a,#1e3a5f,#0f172a)}
.s-challenge{background:linear-gradient(135deg,#1c0000,#7f1d1d)}

/* title */
.big-emoji{font-size:5rem;margin-bottom:24px}
.s-title h1{font-size:3.2rem;font-weight:900;color:#fff;margin-bottom:14px}
.s-title p{font-size:1.35rem;color:rgba(255,255,255,.85);margin-bottom:36px}
.start-btn{background:#fff;color:#0f766e;border:none;border-radius:20px;padding:15px 44px;font-family:'Rubik',sans-serif;font-size:1.2rem;font-weight:900;cursor:pointer;transition:.2s;box-shadow:0 8px 30px rgba(0,0,0,.2)}
.start-btn:hover{transform:scale(1.05)}

/* goals */
.s-goals h2{font-size:2.1rem;font-weight:900;color:#a5b4fc;margin-bottom:32px}
.goal-item{background:rgba(255,255,255,.07);border:1px solid rgba(165,180,252,.3);border-radius:14px;padding:16px 26px;margin:10px 0;display:flex;align-items:center;gap:14px;font-size:1.25rem;font-weight:600;color:#e0e7ff;max-width:620px;text-align:right}

/* concept */
.s-concept h2{font-size:2.2rem;font-weight:900;color:#7dd3fc;margin-bottom:26px}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:860px;width:100%}
.cbox{background:rgba(255,255,255,.07);border:2px solid rgba(125,211,252,.25);border-radius:18px;padding:24px;text-align:right}
.cbox h3{color:#38bdf8;font-size:1.2rem;font-weight:700;margin-bottom:10px}
.cbox p{color:#e0f2fe;font-size:1.05rem;line-height:1.65}
.bigmath{margin-top:22px;font-size:1.9rem;font-weight:900;color:#7dd3fc;background:rgba(255,255,255,.08);padding:10px 28px;border-radius:14px;font-family:monospace;direction:ltr}

/* example */
.s-example h2{font-size:1.9rem;font-weight:900;color:#c4b5fd;margin-bottom:10px}
.prob-box{background:rgba(255,255,255,.1);border:2px solid rgba(196,181,253,.35);border-radius:18px;padding:22px 32px;font-size:1.25rem;font-weight:700;color:#ede9fe;margin-bottom:20px;max-width:680px}
.steps{max-width:680px;width:100%}
.step{display:none;background:rgba(255,255,255,.07);border-right:4px solid #8b5cf6;padding:13px 18px;margin:8px 0;border-radius:0 12px 12px 0;font-size:1.1rem;color:#ede9fe;text-align:right;animation:fadeIn .3s ease}
.step.vis{display:block}
.ans-box{display:none;background:linear-gradient(135deg,rgba(139,92,246,.3),rgba(167,139,250,.15));border:2px solid #a78bfa;border-radius:14px;padding:18px 26px;margin-top:14px;font-size:1.25rem;font-weight:900;color:#f5f3ff;animation:fadeIn .4s ease}
.ans-box.vis{display:block}
.reveal-btn{background:rgba(139,92,246,.3);border:1px solid #8b5cf6;border-radius:12px;padding:11px 26px;color:#ddd6fe;font-family:'Rubik',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:14px;transition:.2s}
.reveal-btn:hover{background:rgba(139,92,246,.5)}
.reveal-btn:disabled{opacity:.5;cursor:default}

/* quiz */
.s-quiz h2{font-size:1.7rem;font-weight:900;color:#fcd34d;margin-bottom:10px}
.q-box{background:rgba(255,255,255,.1);border:2px solid rgba(252,211,77,.35);border-radius:18px;padding:22px 32px;font-size:1.3rem;font-weight:700;color:#fef3c7;margin-bottom:20px;max-width:700px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:700px;width:100%}
.opt{background:rgba(255,255,255,.07);border:2px solid rgba(252,211,77,.28);border-radius:14px;padding:16px 22px;color:#fef3c7;font-family:'Rubik',sans-serif;font-size:1.05rem;font-weight:700;cursor:pointer;transition:.2s;text-align:right}
.opt:hover{background:rgba(252,211,77,.14);transform:scale(1.02)}
.opt.ok{background:rgba(34,197,94,.25)!important;border-color:#22c55e!important;color:#bbf7d0!important}
.opt.no{background:rgba(239,68,68,.25)!important;border-color:#ef4444!important;color:#fecaca!important}
.q-exp{display:none;background:rgba(255,255,255,.1);border-radius:12px;padding:14px 22px;margin-top:14px;color:#fef3c7;font-size:1rem;max-width:700px;animation:fadeIn .4s ease}
.q-exp.vis{display:block}

/* practice */
.s-practice h2{font-size:2rem;font-weight:900;color:#6ee7b7;margin-bottom:18px}
.pq{background:rgba(255,255,255,.07);border:3px dashed rgba(110,231,183,.35);border-radius:18px;padding:26px 32px;font-size:1.25rem;font-weight:600;color:#d1fae5;margin-bottom:22px;max-width:700px}
.hint-box{display:none;background:rgba(251,191,36,.14);border:1px solid rgba(251,191,36,.35);border-radius:12px;padding:13px 20px;color:#fde68a;font-size:1rem;margin-bottom:10px;animation:fadeIn .3s ease}
.hint-box.vis{display:block}
.pans{display:none;background:rgba(110,231,183,.18);border:2px solid #6ee7b7;border-radius:14px;padding:18px 26px;font-size:1.2rem;font-weight:900;color:#ecfdf5;animation:fadeIn .4s ease}
.pans.vis{display:block}
.btn-row{display:flex;gap:12px;margin-top:4px}
.hbtn{background:rgba(251,191,36,.18);border:1px solid rgba(251,191,36,.35);border-radius:12px;padding:11px 22px;color:#fde68a;font-family:'Rubik',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s}
.hbtn:hover{background:rgba(251,191,36,.28)}
.abtn{background:rgba(110,231,183,.18);border:1px solid rgba(110,231,183,.35);border-radius:12px;padding:11px 22px;color:#6ee7b7;font-family:'Rubik',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s}
.abtn:hover{background:rgba(110,231,183,.28)}

/* summary */
.s-summary h2{font-size:2.2rem;font-weight:900;color:#7dd3fc;margin-bottom:8px}
.sum-item{background:rgba(255,255,255,.07);border-right:4px solid #38bdf8;padding:14px 22px;margin:9px 0;border-radius:0 14px 14px 0;font-size:1.15rem;color:#e0f2fe;max-width:620px;text-align:right}
.home-btn{background:linear-gradient(135deg,#14b8a6,#059669);border:none;border-radius:14px;padding:14px 38px;font-family:'Rubik',sans-serif;font-size:1.15rem;font-weight:900;color:#fff;cursor:pointer;margin-top:26px;transition:.2s}
.home-btn:hover{transform:scale(1.05)}

/* challenge */
.s-challenge h2{font-size:1.9rem;font-weight:900;color:#fca5a5;margin-bottom:18px}
.ch-box{background:rgba(255,255,255,.07);border:2px solid rgba(252,165,165,.35);border-radius:18px;padding:26px 32px;font-size:1.2rem;color:#fee2e2;max-width:700px}

@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){
  .slide{padding:36px 20px 100px}
  .s-title h1{font-size:2.2rem}
  .cgrid,.opts{grid-template-columns:1fr}
  .card{padding:32px 22px}
  .card h1{font-size:1.8rem}
}
</style>
</head>
<body>

<div id="teacherScreen">
  <div class="card">
    <div style="font-size:3.5rem;margin-bottom:16px">🦉</div>
    <h1>מצגת ללמידה עצמית</h1>
    <p>הכניסי נושא — המצגת תיוצר מיד, ללא צורך בהתחברות!</p>
    <input type="text" id="topicInput" placeholder="שברים, אחוזים, שטח, גיאומטריה..."
      onkeydown="if(event.key==='Enter')go()">
    <div class="quick-row">
      <button class="qbtn" onclick="q('שברים פשוטים')">🍕 שברים</button>
      <button class="qbtn" onclick="q('שברים עשרוניים')">🔢 עשרוניים</button>
      <button class="qbtn" onclick="q('אחוזים')">💯 אחוזים</button>
      <button class="qbtn" onclick="q('יחס ופרופורציה')">⚖️ יחס</button>
      <button class="qbtn" onclick="q('שטח ופריפריה')">📐 שטח</button>
      <button class="qbtn" onclick="q('גיאומטריה וזוויות')">📏 גיאומטריה</button>
    </div>
    <button id="genBtn" onclick="go()">✨ צרי מצגת!</button>
  </div>
</div>

<div id="pres">
  <div id="progBar"></div>
  <button id="backBtn" onclick="back()">← חזרה</button>
  <div id="slides"></div>
  <div id="nav">
    <button class="nbtn" onclick="next()">←</button>
    <span id="counter">1 / 1</span>
    <button class="nbtn" onclick="prev()">→</button>
  </div>
</div>

<script>
// ── TOPIC DATABASE ──
const DB=[
{kw:['שבר','שברים','מונה','מכנה'],build:t=>[
  {t:'title',e:'🍕',h:'שברים פשוטים',s:'ללמוד לחלק נכון ומהנה!'},
  {t:'goals',h:'🎯 מה נלמד היום?',g:[{i:'🔍',x:'להבין מה זה מונה ומכנה'},{i:'🔄',x:'לזהות שברים שקולים'},{i:'⚖️',x:'להשוות שברים שונים'}]},
  {t:'concept',h:'💡 מה זה שבר?',b:[
    {h:'🔵 המכנה (מטה)',p:'לכמה חלקים שווים חילקו את השלם?\nפיצה חולקה ל-8 פרוסות → מכנה = 8'},
    {h:'🔴 המונה (מעל)',p:'כמה חלקים לקחנו?\nאכלנו 3 פרוסות → מונה = 3'}
  ],m:'3/8'},
  {t:'example',h:'📝 דוגמה: שוקולד',p:'חילקו שוקולד ל-6 חלקים שווים. אכלו 4 חלקים. כמה אכלו? צמצמו!',st:['1️⃣ מכנה = 6 (מספר החלקים)','2️⃣ מונה = 4 (מה שאכלנו)','3️⃣ השבר: 4/6','✂️ צמצום: 4/6 ÷ 2/2 = 2/3'],a:'🍫 אכלו 4/6 = 2/3 מהשוקולד'},
  {t:'concept',h:'🔄 שברים שקולים',b:[
    {h:'💡 איך מוצאים?',p:'כופלים מונה ומכנה באותו מספר!\n½ × 2 = 2/4\n½ × 3 = 3/6\n½ × 4 = 4/8'},
    {h:'📊 עוד דוגמאות',p:'⅓ = 2/6 = 3/9 = 4/12\n¾ = 6/8 = 9/12\nכולם שווים אחד לשני!'}
  ],m:'1/2 = 2/4 = 3/6'},
  {t:'quiz',h:'❓ מי גדול יותר?',q:'3/4 או 2/3?',o:[{x:'3/4 גדול יותר ✓',ok:1},{x:'2/3 גדול יותר',ok:0},{x:'הם שווים',ok:0},{x:'אי אפשר לדעת',ok:0}],ex:'💡 מכנה משותף 12:\n3/4 = 9/12\n2/3 = 8/12\nאז 3/4 > 2/3 ✓'},
  {t:'practice',h:'🏋️ תרגול',q:'חתכו עוגה ל-10 חלקים. אכלו 6.\nמה אכלו? מה נשאר? צמצמו!',hint:'💡 שבר שאכלנו = 6/10. נשאר = 4/10. האם אפשר לצמצם?',a:'✅ 6/10 = 3/5 אכלנו\n4/10 = 2/5 נשאר\nבדיקה: 3/5 + 2/5 = 1 שלם ✓'},
  {t:'summary',e:'🎉',h:'מצוין! סיכום',pts:['📌 שבר = מונה/מכנה','📌 מכנה = כמות החלקים השווים','📌 שברים שקולים: אותו ערך, מכנה שונה','📌 צמצום = חלוקה על אותו מספר']},
  {t:'challenge',e:'🏆',h:'אתגר!',q:'מצאו את כל השברים השקולים ל-2/3 שהמכנה שלהם קטן מ-20!',a:'🏆 4/6, 6/9, 8/12, 10/15, 12/18 — 5 שברים שקולים!'}
]},
{kw:['עשרוני','עשרוניים','נקודה עשרונית'],build:t=>[
  {t:'title',e:'🔢',h:'שברים עשרוניים',s:'מספרים עם נקודה — קל יותר ממה שנדמה!'},
  {t:'goals',h:'🎯 מה נלמד היום?',g:[{i:'📍',x:'ערך המקום של ספרות עשרוניות'},{i:'➕',x:'לחבר ולחסר שברים עשרוניים'},{i:'✖️',x:'לכפול ולחלק ב-10, 100, 1000'}]},
  {t:'concept',h:'💡 ערכי מקום',b:[
    {h:'📊 הטבלה',p:'3.75 :\n3 = אחדות\n7 = עשיריות (7/10)\n5 = מאיות (5/100)'},
    {h:'🔗 קשר לשברים',p:'0.5 = 5/10 = ½\n0.25 = 25/100 = ¼\n0.1 = 1/10\n0.01 = 1/100'}
  ],m:'3.75'},
  {t:'example',h:'📝 חיבור עשרוניים',p:'יוסי קפץ 4.35 מ\'. דנה קפצה 3.8 מ\'. כמה קפצו ביחד?',st:['1️⃣ נסדר לפי הנקודה: 4.35 / + 3.80','2️⃣ נוסיף 0 לשמירת עמודות: 3.80','3️⃣ נחבר מימין לשמאל: 5+0=5, 3+8=11 (נשא), 4+3+1=8','✅ התשובה: 8.15'],a:'🏃 ביחד קפצו 8.15 מטר!'},
  {t:'concept',h:'⚡ כפל וחילוק ב-10, 100',b:[
    {h:'× 10 — נקודה זזת ימינה',p:'3.7 × 10 = 37\n0.45 × 10 = 4.5\n2.08 × 10 = 20.8\n\nכל פעם הנקודה זה ב-1 ימינה'},
    {h:'÷ 10 — נקודה זזת שמאלה',p:'37 ÷ 10 = 3.7\n450 ÷ 100 = 4.5\n1200 ÷ 1000 = 1.2\n\nכל פעם הנקודה זזת ב-1 שמאלה'}
  ],m:'0.06 × 100 = 6'},
  {t:'quiz',h:'❓ חידון',q:'מה התוצאה?\n0.06 × 100 = ?',o:[{x:'0.006',ok:0},{x:'0.6',ok:0},{x:'6 ✓',ok:1},{x:'60',ok:0}],ex:'💡 × 100 = נקודה זזת 2 מקומות ימינה.\n0.06 → 0.6 → 6 ✓'},
  {t:'practice',h:'🏋️ תרגול',q:'חנות מכרה 3 חפיסות עוגיות ב-4.75 ₪ כל אחת.\nכמה עלו הכל?',hint:'💡 4.75 × 3\n= (4 × 3) + (0.75 × 3)\n= 12 + ?',a:'✅ 0.75 × 3 = 2.25\n12 + 2.25 = 14.25 ₪'},
  {t:'summary',e:'🌟',h:'כל הכבוד! סיכום',pts:['📌 הנקודה מפרידה שלמים משברים','📌 מחברים/מחסרים ביישור הנקודה','📌 × 10: נקודה זזת ימינה','📌 ÷ 10: נקודה זזת שמאלה']},
  {t:'challenge',e:'🏆',h:'אתגר!',q:'קניתי 2.5 ק"ג תפוחים ב-5.60 ₪ לקילו\nו-1.5 ק"ג ענבים ב-8.40 ₪ לקילו.\nכמה שילמתי סה"כ?',a:'🏆 תפוחים: 5.60 × 2.5 = 14 ₪\nענבים: 8.40 × 1.5 = 12.60 ₪\nסה"כ: 14 + 12.60 = 26.60 ₪'}
]},
{kw:['אחוז','אחוזים','הנחה','מבצע'],build:t=>[
  {t:'title',e:'💯',h:'אחוזים בחיים האמיתיים',s:'מה זה 20%? איך מחשבים הנחות?'},
  {t:'goals',h:'🎯 מה נלמד היום?',g:[{i:'💡',x:'מה זה אחוז ולמה הוא שימושי'},{i:'🧮',x:'לחשב אחוז מכמות'},{i:'🛍️',x:'בעיות צרכנות: הנחות ומחירים'}]},
  {t:'concept',h:'💡 מה זה אחוז?',b:[
    {h:'📊 הגדרה פשוטה',p:'אחוז = חלק ממאה!\n50% = 50/100 = ½\n25% = 25/100 = ¼\n10% = 10/100 = 1/10\n100% = הכל!'},

function buildGeneric(topic){
  return[
    {t:'title',e:'📚',h:topic,s:'מסע ללמידה עצמית!'},
    {t:'goals',h:'🎯 מה נלמד היום?',g:[{i:'🔍',x:'להכיר מושגים מרכזיים'},{i:'🧮',x:'לתרגל פתרון בעיות'},{i:'🚀',x:'להתמודד עם אתגרים'}]},
    {t:'concept',h:`💡 מושגי מפתח: ${topic}`,b:[{h:'📌 שאלו את עצמכם',p:`מה כבר ידוע לכם על "${topic}"?\nאיפה פגשתם נושא זה בחיי היומיום?`},{h:'🔗 קשרים',p:'חשבו על:\n• דוגמאות מהחיים\n• נושאים קודמים\n• שיעורים אחרים'}],m:topic},
    {t:'example',h:'📝 שיטת פתרון',p:'לכל בעיה יש 4 שלבים:',st:['1️⃣ מה השאלה? מה ידוע?','2️⃣ מה הנוסחה/הדרך?','3️⃣ חישוב שלב אחר שלב','4️⃣ בדיקת התשובה'],a:'💡 בנו דוגמה משלכם ושתפו!'},
    {t:'quiz',h:`❓ שאלה על ${topic}`,q:`מה הדבר הכי חשוב בנושא "${topic}"?`,o:[{x:'הגדרה מדויקת',ok:0},{x:'דוגמאות',ok:0},{x:'חיבור לחיים',ok:0},{x:'כל הנ"ל! ✓',ok:1}],ex:`💡 ללמוד ${topic} = הגדרה + דוגמאות + יישום!`},
    {t:'practice',h:'🏋️ תרגול יצירתי',q:`כתבו 3 שאלות שניתן לשאול על "${topic}":\nשאלה קלה, בינונית וקשה.`,hint:'💡 חשבו: מה ראיתם בכיתה? מה אפשר לחשב?',a:`✅ כל שאלה שכתבתם על ${topic} היא תרגול מצוין!`},
    {t:'summary',e:'🌟',h:'כל הכבוד! סיכום',pts:[`📌 למדנו על: ${topic}`,'📌 חקרנו דוגמאות מחיי היומיום','📌 תרגלנו חשיבה מסדר גבוה','📌 שאלו, חקרו, גלו!']},
    {t:'challenge',e:'🏆',h:'אתגר יצירתי!',q:`צרו בעיה מקורית הקשורה ל-"${topic}".\nהעבירו לחבר/ה לפתרון!`,a:'🏆 יצרת בעיה? כל הכבוד! זו הלמידה הכי עמוקה.'}
  ];
}

// ── RENDERING ──
function m(x){return x?`<span class="math">${x}</span>`:''}
function nl(x){return x?x.replace(/\n/g,'<br>'):x}

function render(s,i){
  switch(s.t){
    case 'title': return `<div class="slide s-title" data-i="${i}">
      <div class="big-emoji">${s.e}</div><h1>${s.h}</h1><p>${s.s}</p>
      <button class="start-btn" onclick="next()">נתחיל! ←</button></div>`;

    case 'goals': return `<div class="slide s-goals" data-i="${i}">
      <h2>${s.h}</h2>
      ${s.g.map((g,gi)=>`<div class="goal-item" style="animation-delay:${gi*.15}s"><span>${g.i}</span><span>${g.x}</span></div>`).join('')}
      </div>`;

    case 'concept': return `<div class="slide s-concept" data-i="${i}">
      <h2>${s.h}</h2>
      <div class="cgrid">${s.b.map(b=>`<div class="cbox"><h3>${b.h}</h3><p>${nl(b.p)}</p></div>`).join('')}</div>
      ${s.m?`<div class="bigmath">${s.m}</div>`:''}
      </div>`;

    case 'example': return `<div class="slide s-example" data-i="${i}">
      <h2>${s.h}</h2>
      <div class="prob-box">${s.p}</div>
      <div class="steps">
        ${s.st.map((step,si)=>`<div class="step" id="st${i}-${si}">${step}</div>`).join('')}
        <div class="ans-box" id="ans${i}">${s.a}</div>
      </div>
      <button class="reveal-btn" id="rbtn${i}" onclick="revealStep(${i},${s.st.length})">📖 הצג את הצעד הבא</button>
      </div>`;

    case 'quiz': return `<div class="slide s-quiz" data-i="${i}">
      <h2>🧠 חידון מהיר</h2>
      <div class="q-box">${s.q}${s.h&&s.h!=='❓ חידון'?'<br><small>'+s.h+'</small>':''}</div>
      <div class="opts">${s.o.map((o,oi)=>`<button class="opt" id="op${i}-${oi}" onclick="pick(${i},${oi},${o.ok})">${o.x}</button>`).join('')}</div>
      <div class="q-exp" id="qex${i}">${nl(s.ex)}</div>
      </div>`;

    case 'practice': return `<div class="slide s-practice" data-i="${i}">
      <h2>${s.h}</h2>
      <div class="pq">${nl(s.q)}</div>
      <div class="hint-box" id="hn${i}">${s.hint}</div>
      <div class="pans" id="pa${i}">${nl(s.a)}</div>
      <div class="btn-row">
        <button class="hbtn" onclick="document.getElementById('hn${i}').classList.add('vis')">💡 רמז</button>
        <button class="abtn" onclick="document.getElementById('pa${i}').classList.add('vis')">✅ תשובה</button>
      </div></div>`;

    case 'summary': return `<div class="slide s-summary" data-i="${i}">
      <div class="big-emoji">${s.e}</div><h2>${s.h}</h2>
      ${s.pts.map(p=>`<div class="sum-item">${p}</div>`).join('')}
      <button class="home-btn" onclick="back()">🏠 חזרה להתחלה</button></div>`;

    case 'challenge': return `<div class="slide s-challenge" data-i="${i}">
      <div class="big-emoji">${s.e}</div><h2>${s.h}</h2>
      <div class="ch-box">
        <div style="margin-bottom:18px">${nl(s.q)}</div>
        <div class="pans" id="ca${i}" style="background:rgba(239,68,68,.15);border-color:#f87171">${nl(s.a)}</div>
        <button class="abtn" style="margin-top:14px" onclick="document.getElementById('ca${i}').classList.add('vis')">🏆 גלה תשובה!</button>
      </div></div>`;
  }
}

// ── STEP REVEAL ──
const SS={};
function revealStep(si,total){
  if(!SS[si])SS[si]=0;
  if(SS[si]<total){
    document.getElementById(`st${si}-${SS[si]}`).classList.add('vis');
    SS[si]++;
  }
  if(SS[si]>=total){
    document.getElementById(`ans${si}`).classList.add('vis');
    const b=document.getElementById(`rbtn${si}`);
    b.textContent='✅ הצגנו הכל!';b.disabled=true;
  }
}

// ── QUIZ ──
function pick(si,oi,ok){
  document.querySelectorAll(`[id^="op${si}-"]`).forEach(b=>b.style.pointerEvents='none');
  const b=document.getElementById(`op${si}-${oi}`);
  b.classList.add(ok?'ok':'no');
  if(!ok) document.querySelectorAll(`[id^="op${si}-"]`).forEach(b=>{if(b.textContent.includes('✓'))b.classList.add('ok')});
  document.getElementById(`qex${si}`).classList.add('vis');
}

// ── NAVIGATION ──
let slides=[],cur=0;

function findTopic(inp){
  for(const d of DB) if(d.kw.some(k=>inp.includes(k))) return d.build(inp);
  return buildGeneric(inp);
}

function go(){
  const t=document.getElementById('topicInput').value.trim();
  if(!t){
    const inp=document.getElementById('topicInput');
    inp.style.borderColor='#ef4444';
    setTimeout(()=>inp.style.borderColor='rgba(20,184,166,0.4)',1500);
    inp.focus();return;
  }
  slides=findTopic(t);cur=0;
  document.getElementById('slides').innerHTML=slides.map((s,i)=>render(s,i)).join('');
  document.getElementById('teacherScreen').style.display='none';
  document.getElementById('pres').style.display='block';
  upd();
}

function upd(){
  document.querySelectorAll('.slide').forEach((s,i)=>{
    s.classList.remove('active','exit');
    if(i===cur)s.classList.add('active');
    else if(i<cur)s.classList.add('exit');
  });
  const pct=((cur+1)/slides.length)*100;
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('counter').textContent=`${cur+1} / ${slides.length}`;
}

function next(){if(cur<slides.length-1){cur++;upd()}}
function prev(){if(cur>0){cur--;upd()}}
function back(){
  document.getElementById('pres').style.display='none';
  document.getElementById('teacherScreen').style.display='flex';
}
function q(t){document.getElementById('topicInput').value=t}

// keyboard + touch
document.addEventListener('keydown',e=>{
  if(document.getElementById('pres').style.display!=='block')return;
  if(e.key==='ArrowLeft'||e.key==='ArrowDown')next();
  if(e.key==='ArrowRight'||e.key==='ArrowUp')prev();
  if(e.key==='Escape')back();
});
let tx=0;
document.addEventListener('touchstart',e=>tx=e.touches[0].clientX);
document.addEventListener('touchend',e=>{
  if(document.getElementById('pres').style.display!=='block')return;
  const d=tx-e.changedTouches[0].clientX;
  if(Math.abs(d)>50){if(d>0)next();else prev();}
});
</script>
